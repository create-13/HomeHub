<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - HomeHub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF3E6C',
                        secondary: '#282C3F'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between py-4">
                <div class="flex items-center space-x-8">
                    <a href="../index.html" class="text-2xl font-bold text-secondary">
                        <i class="fas fa-home text-primary"></i> HomeHub
                    </a>
                    <div class="hidden md:flex space-x-6">
                        <a href="../index.html" class="text-secondary hover:text-primary font-medium transition">Home</a>
                        <a href="products.html" class="text-secondary hover:text-primary font-medium transition">Shop</a>
                    </div>
                </div>

                <div class="flex items-center space-x-6">
                    <div id="user-account" style="display: none;">
                        <div class="flex items-center space-x-3">
                            <i class="fas fa-user-circle text-2xl text-primary"></i>
                            <span class="text-sm font-semibold" id="user-name-display">User</span>
                            <button onclick="handleLogout()" class="text-red-500 hover:text-red-600">
                                <i class="fas fa-sign-out-alt"></i>
                            </button>
                        </div>
                    </div>
                    <a href="cart.html" class="relative">
                        <i class="fas fa-shopping-bag text-xl text-secondary"></i>
                        <span id="cart-count" class="absolute -top-2 -right-2 bg-primary text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-4 py-8">
        
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-secondary mb-2">My Orders</h1>
            <p class="text-gray-600">View and track your order history</p>
        </div>

        <!-- Loading State -->
        <div id="loading" class="text-center py-12">
            <i class="fas fa-spinner fa-spin text-4xl text-primary mb-4"></i>
            <p class="text-gray-600">Loading your orders...</p>
        </div>

        <!-- No Orders -->
        <div id="no-orders" class="hidden text-center py-12">
            <i class="fas fa-box-open text-6xl text-gray-300 mb-4"></i>
            <h3 class="text-xl font-semibold text-gray-700 mb-2">No Orders Yet</h3>
            <p class="text-gray-500 mb-6">You haven't placed any orders yet.</p>
            <a href="products.html" class="inline-block bg-primary text-white px-8 py-3 rounded-lg font-semibold hover:bg-pink-600 transition">
                Start Shopping
            </a>
        </div>

        <!-- Orders List -->
        <div id="orders-container" class="space-y-6">
            <!-- Orders will be loaded here -->
        </div>

    </div>

    <!-- Supabase Config -->
    <script src="../js/config/supabase.js"></script>
    
    <!-- Firebase Config -->
    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
    </script>

    <script>
        let currentUser = null;

        // Auth state check
        auth.onAuthStateChanged(user => {
            currentUser = user;
            
            if (!user) {
                alert('Please login to view orders');
                window.location.href = 'login.html';
                return;
            }

            const userAccount = document.getElementById('user-account');
            if (userAccount) {
                userAccount.style.display = 'flex';
                const displayName = user.displayName || user.email.split('@')[0];
                document.getElementById('user-name-display').textContent = displayName;
            }

            // Load orders
            loadOrders(user.uid);
        });

        // Logout
        async function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                await auth.signOut();
                window.location.href = '../index.html';
            }
        }

        // Format price
        function formatPrice(price) {
            return new Intl.NumberFormat('en-IN', {
                style: 'currency',
                currency: 'INR',
                maximumFractionDigits: 0
            }).format(price);
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-IN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Get status badge
        function getStatusBadge(status) {
            const badges = {
                'pending': '<span class="px-3 py-1 bg-yellow-100 text-yellow-800 rounded-full text-xs font-semibold">Pending</span>',
                'processing': '<span class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-xs font-semibold">Processing</span>',
                'shipped': '<span class="px-3 py-1 bg-purple-100 text-purple-800 rounded-full text-xs font-semibold">Shipped</span>',
                'delivered': '<span class="px-3 py-1 bg-green-100 text-green-800 rounded-full text-xs font-semibold">Delivered</span>',
                'cancelled': '<span class="px-3 py-1 bg-red-100 text-red-800 rounded-full text-xs font-semibold">Cancelled</span>'
            };
            return badges[status] || badges['pending'];
        }

        // Load orders from Supabase
        async function loadOrders(userId) {
            const loading = document.getElementById('loading');
            const noOrders = document.getElementById('no-orders');
            const container = document.getElementById('orders-container');

            try {
                const { data: orders, error } = await supabaseClient
                    .from('orders')
                    .select(`
                        *,
                        order_items (
                            *,
                            product:products (*)
                        )
                    `)
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });

                loading.classList.add('hidden');

                if (error) throw error;

                if (!orders || orders.length === 0) {
                    noOrders.classList.remove('hidden');
                    return;
                }

                // Display orders
                container.innerHTML = orders.map(order => `
                    <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition">
                        
                        <!-- Order Header -->
                        <div class="bg-gray-50 px-6 py-4 border-b flex flex-wrap items-center justify-between">
                            <div>
                                <p class="text-sm text-gray-500">Order ID</p>
                                <p class="font-semibold text-secondary">#${order.order_number}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">Placed On</p>
                                <p class="font-semibold text-secondary">${formatDate(order.created_at)}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">Total Amount</p>
                                <p class="font-semibold text-primary text-lg">${formatPrice(order.total_amount)}</p>
                            </div>
                            <div>
                                ${getStatusBadge(order.order_status)}
                            </div>
                        </div>

                        <!-- Order Items -->
                        <div class="p-6">
                            <div class="space-y-4">
                                ${order.order_items.map(item => `
                                    <div class="flex items-center space-x-4">
                                        <img src="${item.product?.image || 'https://via.placeholder.com/80'}" alt="${item.product_name}" class="w-20 h-20 object-cover rounded-lg">
                                        <div class="flex-1">
                                            <h4 class="font-semibold text-secondary">${item.product_name}</h4>
                                            <p class="text-sm text-gray-500">Quantity: ${item.quantity}</p>
                                        </div>
                                        <div class="text-right">
                                            <p class="font-semibold text-secondary">${formatPrice(item.price)}</p>
                                            <p class="text-xs text-gray-500">per item</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>

                            <!-- Order Actions -->
                            <div class="mt-6 pt-6 border-t flex justify-between items-center">
                                <div class="text-sm text-gray-600">
                                    <i class="fas fa-truck mr-2 text-primary"></i>
                                    ${order.order_status === 'delivered' ? 'Delivered' : order.order_status === 'shipped' ? 'On the way' : 'Processing'}
                                </div>
                                <div class="space-x-3">
                                    <button onclick="viewOrderDetails('${order.id}')" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                                        <i class="fas fa-eye mr-2"></i>View Details
                                    </button>
                                    ${order.order_status !== 'delivered' && order.order_status !== 'cancelled' ? `
                                        <button onclick="trackOrder('${order.order_number}')" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-pink-600 transition">
                                            <i class="fas fa-map-marker-alt mr-2"></i>Track Order
                                        </button>
                                    ` : ''}
                                </div>
                            </div>
                        </div>

                    </div>
                `).join('');

                console.log('✅ Loaded', orders.length, 'orders');

            } catch (error) {
                console.error('Error loading orders:', error);
                loading.classList.add('hidden');
                container.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-exclamation-triangle text-4xl text-red-300 mb-4"></i>
                        <p class="text-gray-600">Error loading orders. Please try again.</p>
                    </div>
                `;
            }
        }

        // View order details
        function viewOrderDetails(orderId) {
            alert('Order details view - Coming soon!\nOrder ID: ' + orderId);
            // You can create a modal or separate page for detailed view
        }

        // Track order
        function trackOrder(orderNumber) {
            alert('Order tracking - Coming soon!\nOrder #' + orderNumber);
            // You can integrate with shipping API or show tracking timeline
        }

        // Update cart count
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = count;
        }

        window.addEventListener('DOMContentLoaded', updateCartCount);
    </script>
</body>
</html>
