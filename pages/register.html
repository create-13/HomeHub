<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - HomeHub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config/supabase.js"></script>
    
    <!-- reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF3E6C',
                        secondary: '#282C3F'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">

    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full">
            
            <!-- Logo -->
            <div class="text-center mb-8">
                <a href="../index.html" class="text-4xl font-bold text-secondary">
                    <i class="fas fa-home text-primary"></i> HomeHub
                </a>
                <h2 class="mt-4 text-3xl font-bold text-secondary">Create Account</h2>
                <p class="mt-2 text-gray-600">Sign up to get started</p>
            </div>

            <!-- Register Form -->
            <div class="bg-white rounded-xl shadow-lg p-8">
                
                <!-- Error Message -->
                <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    <span id="error-text"></span>
                </div>

                <form id="register-form" onsubmit="handleRegister(event)">
                    
                    <!-- Full Name -->
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-secondary mb-2">
                            <i class="fas fa-user mr-2"></i>Full Name
                        </label>
                        <input 
                            type="text" 
                            id="fullName" 
                            required 
                            minlength="3"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                            placeholder="John Doe"
                        >
                    </div>

                    <!-- Email -->
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-secondary mb-2">
                            <i class="fas fa-envelope mr-2"></i>Email Address
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            required 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                            placeholder="your@email.com"
                        >
                    </div>

                    <!-- Password -->
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-secondary mb-2">
                            <i class="fas fa-lock mr-2"></i>Password
                        </label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="password" 
                                required 
                                minlength="6"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                                placeholder="At least 6 characters"
                            >
                            <button type="button" onclick="togglePassword('password')" class="absolute right-3 top-3 text-gray-500 hover:text-gray-700">
                                <i class="fas fa-eye" id="password-icon"></i>
                            </button>
                        </div>
                        <p class="text-xs text-gray-500 mt-1">Must be at least 6 characters</p>
                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-secondary mb-2">
                            <i class="fas fa-lock mr-2"></i>Confirm Password
                        </label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                required 
                                minlength="6"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                                placeholder="Re-enter password"
                            >
                            <button type="button" onclick="togglePassword('confirmPassword')" class="absolute right-3 top-3 text-gray-500 hover:text-gray-700">
                                <i class="fas fa-eye" id="confirmPassword-icon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Terms & Conditions -->
                    <div class="mb-6">
                        <label class="flex items-start">
                            <input type="checkbox" id="terms" required class="mt-1 mr-2">
                            <span class="text-sm text-gray-600">
                                I agree to the <a href="#" class="text-primary hover:underline">Terms & Conditions</a> and <a href="#" class="text-primary hover:underline">Privacy Policy</a>
                            </span>
                        </label>
                    </div>

                    <!-- reCAPTCHA -->
                    <div class="mb-6 flex justify-center">
                        <div class="g-recaptcha" data-sitekey="6Lfy_pssAAAAAGK-zoDNifT3MefcL3KcJsL1q5iG"></div>
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="submit" 
                        id="register-btn"
                        class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-pink-600 transition"
                    >
                        <i class="fas fa-user-plus mr-2"></i>Create Account
                    </button>

                </form>

                <!-- Divider -->
                <div class="my-6 flex items-center">
                    <div class="flex-1 border-t border-gray-300"></div>
                    <span class="px-4 text-sm text-gray-500">OR</span>
                    <div class="flex-1 border-t border-gray-300"></div>
                </div>

                <!-- Login Link -->
                <div class="text-center">
                    <p class="text-gray-600">
                        Already have an account? 
                        <a href="login.html" class="text-primary font-semibold hover:underline">Login</a>
                    </p>
                </div>

            </div>

            <!-- Back to Home -->
            <div class="text-center mt-6">
                <a href="../index.html" class="text-gray-600 hover:text-primary">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Home
                </a>
            </div>

        </div>
    </div>

    <!-- Firebase Config -->
    <script src="../js/config/firebase.js"></script>
    
    <script>
        // Toggle password visibility
        function togglePassword(fieldId) {
            const passwordInput = document.getElementById(fieldId);
            const passwordIcon = document.getElementById(fieldId + '-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                passwordIcon.className = 'fas fa-eye';
            }
        }

        // Show error message
        function showError(message) {
            document.getElementById('error-message').classList.remove('hidden');
            document.getElementById('error-text').textContent = message;
        }

        // Hide error message
        function hideError() {
            document.getElementById('error-message').classList.add('hidden');
        }

        // Handle registration
        async function handleRegister(event) {
            event.preventDefault();
            hideError();

            // Verify reCAPTCHA
            const recaptchaResponse = grecaptcha.getResponse();
            if (recaptchaResponse.length === 0) {
                showError('Please complete the reCAPTCHA verification');
                return;
            }

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;

            // Validate passwords match
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            // Validate terms
            if (!terms) {
                showError('Please accept the Terms & Conditions');
                return;
            }

            const registerBtn = document.getElementById('register-btn');

            // Disable button
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Creating Account...';

            try {
                // Create Firebase user
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Update display name
                await user.updateProfile({
                    displayName: fullName
                });

                console.log('Registration successful:', user);

                // Save user to Supabase
                await saveUserToSupabase(user, fullName);

                // Show success message
                showSuccess('Account created successfully! Redirecting...');

                // Redirect to home
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 1500);

            } catch (error) {
                console.error('Registration error:', error);
                
                // Show user-friendly error
                let errorMessage = 'Registration failed. Please try again.';
                
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'This email is already registered. Please login instead.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email address.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Password is too weak. Please use a stronger password.';
                }
                
                showError(errorMessage);
                
                // Reset button
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-user-plus mr-2"></i>Create Account';
                
                // Reset reCAPTCHA
                grecaptcha.reset();
            }
        }

        // Save user to Supabase
        async function saveUserToSupabase(user, fullName) {
            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .insert({
                        firebase_uid: user.uid,
                        email: user.email,
                        full_name: fullName,
                        created_at: new Date().toISOString()
                    });
                
                if (error) {
                    console.error('Error saving user to Supabase:', error);
                }
            } catch (err) {
                console.error('Supabase error:', err);
            }
        }

        // Show success message
        function showSuccess(message) {
            const successDiv = document.createElement('div');
            successDiv.className = 'fixed top-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50';
            successDiv.innerHTML = `<i class="fas fa-check-circle mr-2"></i>${message}`;
            document.body.appendChild(successDiv);
            setTimeout(() => successDiv.remove(), 3000);
        }

        // Check if already logged in
        auth.onAuthStateChanged(user => {
            if (user) {
                // Already logged in, redirect to home
                window.location.href = '../index.html';
            }
        });
    </script>
</body>
</html>
