<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - HomeHub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF3E6C',
                        secondary: '#282C3F'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">

    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full">
            
            <!-- Logo -->
            <div class="text-center mb-8">
                <a href="../index.html" class="text-4xl font-bold text-secondary">
                    <i class="fas fa-home text-primary"></i> HomeHub
                </a>
                <h2 class="mt-4 text-3xl font-bold text-secondary">Forgot Password?</h2>
                <p class="mt-2 text-gray-600">Enter your email to reset password</p>
            </div>

            <!-- Reset Form -->
            <div class="bg-white rounded-xl shadow-lg p-8">
                
                <!-- Success Message -->
                <div id="success-message" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4">
                    <i class="fas fa-check-circle mr-2"></i>
                    <span id="success-text"></span>
                </div>

                <!-- Error Message -->
                <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    <span id="error-text"></span>
                </div>

                <form id="reset-form" onsubmit="handleReset(event)">
                    
                    <!-- Email -->
                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-secondary mb-2">
                            <i class="fas fa-envelope mr-2"></i>Email Address
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            required 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                            placeholder="your@email.com"
                        >
                        <p class="text-xs text-gray-500 mt-2">We'll send you a password reset link</p>
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="submit" 
                        id="reset-btn"
                        class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-pink-600 transition mb-4"
                    >
                        <i class="fas fa-paper-plane mr-2"></i>Send Reset Link
                    </button>

                    <!-- Back to Login -->
                    <a href="login.html" class="block text-center text-primary hover:underline">
                        <i class="fas fa-arrow-left mr-2"></i>Back to Login
                    </a>

                </form>

            </div>

            <!-- Back to Home -->
            <div class="text-center mt-6">
                <a href="../index.html" class="text-gray-600 hover:text-primary">
                    <i class="fas fa-home mr-2"></i>Back to Home
                </a>
            </div>

        </div>
    </div>

    <!-- Firebase Config -->
    <script src="../js/config/firebase.js"></script>
    
    <script>
        // Show error message
        function showError(message) {
            document.getElementById('error-message').classList.remove('hidden');
            document.getElementById('error-text').textContent = message;
            document.getElementById('success-message').classList.add('hidden');
        }

        // Show success message
        function showSuccess(message) {
            document.getElementById('success-message').classList.remove('hidden');
            document.getElementById('success-text').textContent = message;
            document.getElementById('error-message').classList.add('hidden');
        }

        // Handle password reset
        async function handleReset(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const resetBtn = document.getElementById('reset-btn');

            // Disable button
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Sending...';

            try {
                // Send password reset email
                await auth.sendPasswordResetEmail(email);
                
                showSuccess('Password reset link sent! Check your email inbox.');
                
                // Clear form
                document.getElementById('reset-form').reset();

            } catch (error) {
                console.error('Reset error:', error);
                
                // Show user-friendly error
                let errorMessage = 'Failed to send reset link. Please try again.';
                
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'No account found with this email.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email address.';
                }
                
                showError(errorMessage);
            } finally {
                // Reset button
                resetBtn.disabled = false;
                resetBtn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i>Send Reset Link';
            }
        }
    </script>
</body>
</html>
