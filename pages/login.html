<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HomeHub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <!-- reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF3E6C',
                        secondary: '#282C3F'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">

    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full">
            
            <!-- Logo -->
            <div class="text-center mb-8">
                <a href="../index.html" class="text-4xl font-bold text-secondary">
                    <i class="fas fa-home text-primary"></i> HomeHub
                </a>
                <h2 class="mt-4 text-3xl font-bold text-secondary">Welcome Back!</h2>
                <p class="mt-2 text-gray-600">Login to your account</p>
            </div>

            <!-- Login Form -->
            <div class="bg-white rounded-xl shadow-lg p-8">
                
                <!-- Error Message -->
                <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    <span id="error-text"></span>
                </div>

                <form id="login-form" onsubmit="handleLogin(event)">
                    
                    <!-- Email -->
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-secondary mb-2">
                            <i class="fas fa-envelope mr-2"></i>Email Address
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            required 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                            placeholder="your@email.com"
                        >
                    </div>

                    <!-- Password -->
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-secondary mb-2">
                            <i class="fas fa-lock mr-2"></i>Password
                        </label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="password" 
                                required 
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                                placeholder="Enter your password"
                            >
                            <button type="button" onclick="togglePassword()" class="absolute right-3 top-3 text-gray-500 hover:text-gray-700">
                                <i class="fas fa-eye" id="password-icon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="flex items-center justify-between mb-6">
                        <label class="flex items-center">
                            <input type="checkbox" id="remember-me" class="mr-2">
                            <span class="text-sm text-gray-600">Remember me</span>
                        </label>
                        <a href="forgot-password.html" class="text-sm text-primary hover:underline">
                            Forgot password?
                        </a>
                    </div>

                    <!-- reCAPTCHA -->
                    <div class="mb-6 flex justify-center">
                        <div class="g-recaptcha" data-sitekey="6Lfy_pssAAAAAGK-zoDNifT3MefcL3KcJsL1q5iG"></div>
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="submit" 
                        id="login-btn"
                        class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-pink-600 transition"
                    >
                        <i class="fas fa-sign-in-alt mr-2"></i>Login
                    </button>

                </form>

                <!-- Divider -->
                <div class="my-6 flex items-center">
                    <div class="flex-1 border-t border-gray-300"></div>
                    <span class="px-4 text-sm text-gray-500">OR</span>
                    <div class="flex-1 border-t border-gray-300"></div>
                </div>

                <!-- Sign Up Link -->
                <div class="text-center">
                    <p class="text-gray-600">
                        Don't have an account? 
                        <a href="register.html" class="text-primary font-semibold hover:underline">Sign Up</a>
                    </p>
                </div>

            </div>

            <!-- Back to Home -->
            <div class="text-center mt-6">
                <a href="../index.html" class="text-gray-600 hover:text-primary">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Home
                </a>
            </div>

        </div>
    </div>

    <!-- Firebase Config -->
    <script src="../js/config/firebase.js"></script>
    
    <script>
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('password-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                passwordIcon.className = 'fas fa-eye';
            }
        }

        // Show error message
        function showError(message) {
            document.getElementById('error-message').classList.remove('hidden');
            document.getElementById('error-text').textContent = message;
        }

        // Hide error message
        function hideError() {
            document.getElementById('error-message').classList.add('hidden');
        }

        // Handle login
        async function handleLogin(event) {
            event.preventDefault();
            hideError();

            // Verify reCAPTCHA
            const recaptchaResponse = grecaptcha.getResponse();
            if (recaptchaResponse.length === 0) {
                showError('Please complete the reCAPTCHA verification');
                return;
            }

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('login-btn');

            // Disable button
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Logging in...';

            try {
                // Sign in with Firebase
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                console.log('Login successful:', userCredential.user);

                // Save user info to Supabase (optional)
                await saveUserToSupabase(userCredential.user);

                // Show success message
                showSuccess('Login successful! Redirecting...');

                // Redirect to home
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 1500);

            } catch (error) {
                console.error('Login error:', error);
                
                // Show user-friendly error
                let errorMessage = 'Login failed. Please try again.';
                
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'No account found with this email.';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Incorrect password.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email address.';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Too many failed attempts. Please try again later.';
                }
                
                showError(errorMessage);
                
                // Reset button
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Login';
                
                // Reset reCAPTCHA
                grecaptcha.reset();
            }
        }

        // Save user to Supabase
        async function saveUserToSupabase(user) {
            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .upsert({
                        firebase_uid: user.uid,
                        email: user.email,
                        last_login: new Date().toISOString()
                    });
                
                if (error) {
                    console.error('Error saving user to Supabase:', error);
                }
            } catch (err) {
                console.error('Supabase error:', err);
            }
        }

        // Show success message
        function showSuccess(message) {
            const successDiv = document.createElement('div');
            successDiv.className = 'fixed top-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50';
            successDiv.innerHTML = `<i class="fas fa-check-circle mr-2"></i>${message}`;
            document.body.appendChild(successDiv);
            setTimeout(() => successDiv.remove(), 3000);
        }

        // Check if already logged in
        auth.onAuthStateChanged(user => {
            if (user) {
                // Already logged in, redirect to home
                window.location.href = '../index.html';
            }
        });
    </script>
</body>
</html>
